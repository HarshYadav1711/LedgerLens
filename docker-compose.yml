services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerlens
      POSTGRES_PASSWORD: ledgerlens
      POSTGRES_DB: ledgerlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerlens -d ledgerlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://ledgerlens:ledgerlens@postgres:5432/ledgerlens
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://ledgerlens:ledgerlens@postgres:5432/ledgerlens
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://ledgerlens:ledgerlens@postgres:5432/ledgerlens
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
  uploads_data:
